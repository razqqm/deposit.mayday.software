<!--
Master splash-screen SVG for iOS Apple Touch Startup Images.
Rasterized into device-specific portrait PNGs via rsvg-convert (see
scripts/generate-splash.sh). Amber gradient matches manifest theme_color.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1290" height="2796" viewBox="0 0 1290 2796"
     preserveAspectRatio="xMidYMid slice" role="img" aria-label="deposit">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
            <stop offset="0%" stop-color="#fff7e6"/>
            <stop offset="100%" stop-color="#fdfdfd"/>
        </linearGradient>
        <radialGradient id="glow" cx="50%" cy="45%" r="45%">
            <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#f59e0b"/>
            <stop offset="100%" stop-color="#d97706"/>
        </linearGradient>
    </defs>

    <rect width="1290" height="2796" fill="url(#bg)"/>
    <rect width="1290" height="2796" fill="url(#glow)"/>

    <!-- Centered brand tile + wordmark -->
    <g transform="translate(645 1200)">
        <!-- Rounded amber tile, 240×240 -->
        <rect x="-120" y="-120" width="240" height="240" rx="56" fill="url(#amber)"/>
        <!-- Download-arrow glyph matching favicon: chevron + stem + baseline -->
        <g stroke="#1a1208" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <path d="M -56 -16 L 0 40 L 56 -16"/>
            <line x1="0" y1="-64" x2="0" y2="24"/>
            <line x1="-72" y1="72" x2="72" y2="72"/>
        </g>
    </g>

    <!-- Wordmark -->
    <text x="645" y="1500" text-anchor="middle"
          font-family="Space Grotesk, Inter, system-ui, -apple-system, sans-serif"
          font-size="104" font-weight="700" fill="#0b0b0f" letter-spacing="-2.5">deposit</text>

    <!-- Subtitle -->
    <text x="645" y="1560" text-anchor="middle"
          font-family="Inter, system-ui, -apple-system, sans-serif"
          font-size="36" font-weight="500" fill="#52525b" letter-spacing="0.5">
        Prove you created it first
    </text>

    <!-- Footer wordmark -->
    <text x="645" y="2700" text-anchor="middle"
          font-family="JetBrains Mono, SF Mono, Menlo, monospace"
          font-size="26" fill="#71717a" letter-spacing="1">
        deposit.mayday.software
    </text>
</svg>

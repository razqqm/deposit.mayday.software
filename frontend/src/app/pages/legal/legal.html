<ui-section
    [eyebrow]="kind() + '.eyebrow' | translate"
    [title]="kind() + '.title' | translate"
    [subtitle]="kind() + '.subtitle' | translate"
    [narrow]="true">

    <aside class="legal-notice" role="note">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span>{{ kind() + '.boilerplate' | translate }}</span>
    </aside>

    <article class="legal-prose">
        @for (n of sections(); track n) {
            <section>
                <h2>{{ headingKey(n) | translate }}</h2>
                <p>{{ paragraphKey(n) | translate }}</p>
            </section>
        }
    </article>
</ui-section>

name = "deposit-mayday-software"
main = "worker/src/index.ts"
compatibility_date = "2026-04-06"

# Static SPA assets — Cloudflare Workers Static Assets serves these
# directly without spinning up the Worker for static GETs.
#
# html_handling = "none" disables Cloudflare's automatic /index.html → /
# canonicalization redirect. We need this because Angular's service worker
# fetches `/index.html` as its index during navigation; a 307 redirect to
# `/` in that chain makes Safari hang the page in an infinite loop (Safari
# caches the redirect response in the SW Cache API and replays indefinitely).
# With "none" each URL is served as-is: /index.html returns the file,
# / also returns it (via not_found_handling: single-page-application).
[assets]
directory = "frontend/dist/mayday-software/browser"
not_found_handling = "single-page-application"
html_handling = "none"
binding = "ASSETS"

# The Worker handles only the dynamic /api/* routes (TSA + OTS proxies).
# Anything else falls through to ASSETS via env.ASSETS.fetch(request).
# Custom-domain binding for deposit.mayday.software is managed in the
# Cloudflare dashboard.
